<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Daily Draw</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f6f3ec;
      --surface: #ffffff;
      --border: #d4cdc3;
      --border-dashed: #b8b0a0;
      --placeholder-bg: #eeebe4;
      --text: #2a2a2a;
      --text-muted: #8a847c;
      --accent: #2c3e2d;
      --accent-light: #e4ece4;
      --danger: #c0392b;
      --radius: 10px;
      --shadow: 0 1px 4px rgba(0,0,0,0.08), 0 4px 16px rgba(0,0,0,0.05);
    }

    html, body {
      min-height: 100%; background: var(--bg);
      color: var(--text); font-family: 'Georgia', 'Times New Roman', serif;
    }

    #app { min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Login ── */
    .login-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem;
    }
    .login-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 3rem 2.5rem; width: 100%; max-width: 380px;
      box-shadow: var(--shadow);
    }
    .login-card h1 {
      font-size: 1.8rem; font-weight: normal; letter-spacing: 0.05em;
      margin-bottom: 0.25rem; text-align: center;
    }
    .login-card p { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 2rem; font-family: sans-serif; }
    .field { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
    .field label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-family: sans-serif; }
    .field input {
      padding: 0.65rem 0.9rem; border: 1px solid var(--border); border-radius: 6px;
      font-size: 1rem; background: var(--bg); color: var(--text);
      outline: none; transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); }
    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0.65rem 1.4rem; border: 1px solid transparent;
      border-radius: 6px; font-size: 0.9rem; cursor: pointer;
      transition: background 0.15s, border-color 0.15s; font-family: sans-serif;
      white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; margin-top: 0.5rem; }
    .btn-primary:hover { background: #3a5040; }
    .btn-ghost { background: transparent; color: var(--text-muted); border-color: var(--border); font-size: 0.8rem; }
    .btn-ghost:hover { background: var(--placeholder-bg); }
    .error-msg { color: var(--danger); font-size: 0.8rem; font-family: sans-serif; margin-top: 0.5rem; text-align: center; }

    /* ── App shell ── */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 1rem 2rem; display: flex; align-items: center; gap: 1.5rem;
    }
    header h1 { font-size: 1.2rem; font-weight: normal; letter-spacing: 0.05em; flex: 1; }
    nav { display: flex; gap: 0.25rem; }
    .nav-btn {
      padding: 0.4rem 1rem; border-radius: 6px; border: none; cursor: pointer;
      font-size: 0.85rem; font-family: sans-serif; background: transparent; color: var(--text-muted);
      transition: background 0.15s, color 0.15s;
    }
    .nav-btn.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
    .nav-btn:hover:not(.active) { background: var(--placeholder-bg); }
    .user-chip {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.8rem; font-family: sans-serif; color: var(--text-muted);
    }
    .user-chip strong { color: var(--text); }

    main { flex: 1; padding: 2.5rem 2rem; max-width: 900px; margin: 0 auto; width: 100%; }
    @media (max-width: 600px) { main { padding: 1.5rem 1rem; } header { padding: 0.85rem 1rem; gap: 0.75rem; } header h1 { font-size: 1rem; } .nav-btn { padding: 0.35rem 0.65rem; font-size: 0.78rem; } .user-chip { font-size: 0.72rem; } }

    /* ── Today ── */
    .today-date {
      text-align: center; margin-bottom: 0.5rem;
    }
    .today-date .day-name {
      font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.2em;
      color: var(--text-muted); font-family: sans-serif;
    }
    .today-date .date-num {
      font-size: 2.8rem; font-weight: normal; line-height: 1.1;
    }
    .today-date .month-year {
      font-size: 1rem; color: var(--text-muted); font-family: sans-serif;
    }

    .inspiration-wrap { text-align: center; margin: 1.5rem 0 2.5rem; }
    .btn-inspiration {
      background: transparent; border: 1px dashed var(--border-dashed);
      color: var(--text-muted); font-family: sans-serif; font-size: 0.82rem;
      padding: 0.5rem 1.2rem; border-radius: 20px; cursor: pointer;
      transition: all 0.15s; letter-spacing: 0.05em;
    }
    .btn-inspiration:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

    .columns { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2rem; }
    @media (max-width: 600px) { .columns { grid-template-columns: 1fr; } }

    .col-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow);
    }
    .col-header {
      padding: 0.9rem 1.2rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .col-name { font-family: sans-serif; font-size: 0.85rem; font-weight: 600; text-transform: capitalize; }
    .col-you { font-size: 0.7rem; color: var(--text-muted); font-family: sans-serif; }
    .col-body { position: relative; }

    .placeholder {
      aspect-ratio: 4/3; background: var(--placeholder-bg);
      border: 2px dashed var(--border-dashed); margin: 1rem;
      border-radius: 8px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.6rem;
      color: var(--text-muted); cursor: pointer; transition: background 0.15s, border-color 0.15s;
    }
    .placeholder.own:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
    .placeholder.waiting { cursor: default; }
    .placeholder svg { opacity: 0.4; }
    .placeholder span { font-family: sans-serif; font-size: 0.8rem; text-align: center; padding: 0 1rem; }
    .placeholder.drag-over { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }

    .upload-preview { position: relative; }
    .upload-preview img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }
    .replace-btn {
      position: absolute; bottom: 0.75rem; right: 0.75rem;
      background: rgba(0,0,0,0.55); color: #fff;
      border: none; border-radius: 5px; padding: 0.35rem 0.75rem;
      font-size: 0.72rem; font-family: sans-serif; cursor: pointer;
      backdrop-filter: blur(4px); letter-spacing: 0.05em;
      transition: background 0.15s;
    }
    .replace-btn:hover { background: rgba(0,0,0,0.8); }

    .uploading-indicator {
      aspect-ratio: 4/3; margin: 1rem; background: var(--placeholder-bg);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-family: sans-serif; font-size: 0.85rem;
    }

    /* ── Inspiration modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 1rem;
    }
    .modal {
      background: var(--surface); border-radius: var(--radius);
      padding: 2rem; max-width: 480px; width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
    }
    .modal h2 { font-size: 1.1rem; font-weight: normal; margin-bottom: 1.5rem; }
    .prompts-list { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem; }
    .prompt-item {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.85rem 1rem;
      font-size: 0.9rem; line-height: 1.5; font-family: sans-serif;
    }
    .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; }

    /* ── Past ── */
    .past-header { margin-bottom: 2rem; }
    .past-header h2 { font-size: 1.5rem; font-weight: normal; }
    .past-header p { color: var(--text-muted); font-family: sans-serif; font-size: 0.85rem; margin-top: 0.25rem; }

    .day-row { margin-bottom: 2rem; }
    .day-row-label {
      font-family: sans-serif; font-size: 0.75rem; text-transform: uppercase;
      letter-spacing: 0.15em; color: var(--text-muted); margin-bottom: 0.75rem;
      padding-bottom: 0.5rem; border-bottom: 1px solid var(--border);
    }
    .day-row-cols { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    @media (max-width: 600px) { .day-row-cols { grid-template-columns: 1fr; } }

    .past-col { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .past-col-name { padding: 0.5rem 0.75rem; font-family: sans-serif; font-size: 0.75rem; color: var(--text-muted); border-bottom: 1px solid var(--border); }
    .past-col img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }
    .past-col .empty { aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; background: var(--placeholder-bg); color: var(--border-dashed); font-size: 1.5rem; }

    .empty-past { text-align: center; padding: 4rem 2rem; color: var(--text-muted); font-family: sans-serif; font-size: 0.9rem; }

    /* ── Streak badge ── */
    .streak-badge { font-family: sans-serif; font-size: 0.75rem; color: var(--text-muted); }

    /* ── Settings ── */
    .settings-wrap { max-width: 480px; }
    .settings-title { font-size: 1.5rem; font-weight: normal; margin-bottom: 2rem; }
    .settings-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; }
    .settings-section-title { font-family: sans-serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 1rem; }
    .lang-toggle { display: flex; gap: 0.5rem; }
    .lang-btn { padding: 0.5rem 1.5rem; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--text-muted); font-family: sans-serif; font-size: 0.9rem; cursor: pointer; transition: all 0.15s; }
    .lang-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .lang-btn:hover:not(.active) { background: var(--placeholder-bg); }
    .settings-msg { font-family: sans-serif; font-size: 0.82rem; margin-top: 0.75rem; min-height: 1.2em; }
    .settings-msg.error { color: var(--danger); }
    .settings-msg.success { color: var(--accent); }

    /* Loading spinner */
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <div id="app"></div>
  <input type="file" id="file-input" accept="image/*" />
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
